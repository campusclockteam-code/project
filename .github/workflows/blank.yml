name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  # Job 1: Build and Verify React Web App & Admin Dashboard
  build-web:
    name: Build React Web App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Build Web App
        run: npm run build

  # Job 2: Build and Packaging Flutter Android App
  build-flutter-android:
    name: Build Flutter Android App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Restore Firebase Google Services Config
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            mkdir -p campus_clock_slcplus-main/android/app
            printf '%s' "$GOOGLE_SERVICES_JSON" > campus_clock_slcplus-main/android/app/google-services.json
          else
            echo "Warning: GOOGLE_SERVICES_JSON secret not found. Using default/fallback services config."
          fi

      - name: Install Flutter packages
        working-directory: campus_clock_slcplus-main
        run: flutter pub get

      - name: Build Release APK
        working-directory: campus_clock_slcplus-main
        run: |
          # Disable Gradle daemon for faster CI builds and stable memory footprint
          flutter build apk --release --no-pub --dart-define=org.gradle.daemon=false

      - name: Upload Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: campus-clock-slc-release-apk
          path: campus_clock_slcplus-main/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: warn
          retention-days: 30
