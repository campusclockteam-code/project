name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  # Build and Packaging Flutter Android App
  build-flutter-android:
    name: Build Flutter Android App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect Flutter Directory
        id: detect
        run: |
          if [ -f "pubspec.yaml" ]; then
            echo "dir=." >> $GITHUB_OUTPUT
            echo "Found pubspec.yaml in root"
          elif [ -f "campus_clock_slcplus-main/pubspec.yaml" ]; then
            echo "dir=campus_clock_slcplus-main" >> $GITHUB_OUTPUT
            echo "Found pubspec.yaml in campus_clock_slcplus-main"
          else
            # Dynamic fallback search up to 3 levels deep
            dir=$(find . -maxdepth 3 -name "pubspec.yaml" -print -quit | xargs dirname)
            if [ -n "$dir" ] && [ "$dir" != "." ]; then
              dir=${dir#./}
              echo "dir=$dir" >> $GITHUB_OUTPUT
              echo "Found pubspec.yaml dynamically in: $dir"
            else
              echo "dir=." >> $GITHUB_OUTPUT
              echo "No pubspec.yaml found, using root as runtime directory"
            fi
          fi

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Restore Firebase Google Services Config
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          TARGET_DIR="${{ steps.detect.outputs.dir }}/android/app"
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            mkdir -p "$TARGET_DIR"
            printf '%s' "$GOOGLE_SERVICES_JSON" > "$TARGET_DIR/google-services.json"
          else
            echo "Warning: GOOGLE_SERVICES_JSON secret not found. Using default/fallback services config."
          fi

      - name: Install Flutter packages
        working-directory: ${{ steps.detect.outputs.dir }}
        run: flutter pub get

      - name: Build Release APK
        working-directory: ${{ steps.detect.outputs.dir }}
        run: |
          # Disable Gradle daemon for faster CI builds and stable memory footprint
          flutter build apk --release --no-pub --dart-define=org.gradle.daemon=false

      - name: Upload Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: campus-clock-slc-release-apk
          path: ${{ steps.detect.outputs.dir }}/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: warn
          retention-days: 30

